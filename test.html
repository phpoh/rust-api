<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>DigitalCrown WebSocket Test</title>
<style>
  body { font-family: monospace; background: #0a0a1a; color: #00ff88; padding: 20px; }
  h1 { color: #00ccff; }
  #log { background: #111; border: 1px solid #333; padding: 10px; height: 300px; overflow-y: auto; white-space: pre-wrap; }
  button { background: #1a1a3a; color: #00ff88; border: 1px solid #00ff88; padding: 8px 16px; margin: 5px; cursor: pointer; }
  button:hover { background: #00ff88; color: #000; }
  input { background: #111; color: #00ff88; border: 1px solid #333; padding: 5px; width: 80px; }
</style>
</head>
<body>
<h1>[SYSTEM] DigitalCrown WebSocket Controller</h1>
<p>Status: <span id="status">Disconnected</span></p>
<button onclick="connect()">Connect</button>
<button onclick="disconnect()">Disconnect</button>
<hr>
<p>Delta: <input id="delta" type="number" value="5"> Speed: <input id="speed" type="number" value="0.3" step="0.1" min="0" max="1"></p>
<button onclick="sendCrown()">Send Crown Input</button>
<button onclick="rapidFire()">Rapid Fire (10x)</button>
<hr>
<h2>Log</h2>
<div id="log"></div>

<script>
  let ws;
  const logEl = document.getElementById('log');

  function log(msg) {
    logEl.textContent += msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function connect() {
    ws = new WebSocket('ws://localhost:3000/ws/crown');
    ws.onopen = () => {
      document.getElementById('status').textContent = 'Connected';
      document.getElementById('status').style.color = '#00ff88';
      log('[SYSTEM] DigitalCrown Controller: ONLINE');
    };
    ws.onmessage = (e) => log('[RECV] ' + e.data);
    ws.onclose = () => {
      document.getElementById('status').textContent = 'Disconnected';
      document.getElementById('status').style.color = 'red';
      log('[SYSTEM] DigitalCrown Controller: OFFLINE');
    };
  }

  function disconnect() { if (ws) ws.close(); }

  function sendCrown() {
    if (!ws || ws.readyState !== 1) { log('Not connected!'); return; }
    const data = { delta: parseInt(document.getElementById('delta').value), speed: parseFloat(document.getElementById('speed').value) };
    ws.send(JSON.stringify(data));
    log('[SEND] ' + JSON.stringify(data));
  }

  function rapidFire() {
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const speed = 0.1 + (i * 0.09);
        const data = { delta: 3, speed };
        ws.send(JSON.stringify(data));
        log('[SEND] ' + JSON.stringify(data));
      }, i * 200);
    }
  }
</script>
</body>
</html>
